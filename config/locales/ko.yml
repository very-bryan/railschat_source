ko:
  date:
    formats:
      default: "%Y-%m-%d"
      short: "%m/%d"
      long: "%Y년 %m월 %d일"
    day_names: [일요일, 월요일, 화요일, 수요일, 목요일, 금요일, 토요일]
    abbr_day_names: [일, 월, 화, 수, 목, 금, 토]
    month_names: [~, 1월, 2월, 3월, 4월, 5월, 6월, 7월, 8월, 9월, 10월, 11월, 12월]
    abbr_month_names: [~, 1월, 2월, 3월, 4월, 5월, 6월, 7월, 8월, 9월, 10월, 11월, 12월]
    order:
      - :year
      - :month
      - :day
  
  time:
    formats:
      default: "%Y-%m-%d %H:%M:%S"
      short: "%m/%d %H:%M"
      long: "%Y년 %m월 %d일 %H시 %M분 %S초"
    am: "오전"
    pm: "오후"
  
  datetime:
    distance_in_words:
      half_a_minute: "30초"
      less_than_x_seconds:
        one: "1초 이내"
        other: "%{count}초 이내"
      x_seconds:
        one: "1초"
        other: "%{count}초"
      less_than_x_minutes:
        one: "1분 이내"
        other: "%{count}분 이내"
      x_minutes:
        one: "1분"
        other: "%{count}분"
      about_x_hours:
        one: "약 1시간"
        other: "약 %{count}시간"
      x_hours:
        one: "1시간"
        other: "%{count}시간"
      x_days:
        one: "1일"
        other: "%{count}일"
      about_x_months:
        one: "약 1개월"
        other: "약 %{count}개월"
      x_months:
        one: "1개월"
        other: "%{count}개월"
      about_x_years:
        one: "약 1년"
        other: "약 %{count}년"
      over_x_years:
        one: "1년 이상"
        other: "%{count}년 이상"
      almost_x_years:
        one: "거의 1년"
        other: "거의 %{count}년"
      x_years:
        one: "1년"
        other: "%{count}년"
      x_weeks:
        one: "1주"
        other: "%{count}주"
      less_than_x_hours:
        one: "1시간 이내"
        other: "%{count}시간 이내"
    prompts:
      year: "년"
      month: "월"
      day: "일"
      hour: "시"
      minute: "분"
      second: "초"
      
  number:
    format:
      separator: "."
      delimiter: ","
      precision: 3
      significant: false
      strip_insignificant_zeros: false
    currency:
      format:
        format: "%n%u"
        unit: "원"
        separator: "."
        delimiter: ","
        precision: 0
        significant: false
        strip_insignificant_zeros: false
    percentage:
      format:
        delimiter: ""
    precision:
      format:
        delimiter: ""
    human:
      format:
        delimiter: ""
        precision: 3
        significant: true
        strip_insignificant_zeros: true
      storage_units:
        format: "%n %u"
        units:
          byte:
            one: "바이트"
            other: "바이트"
          kb: "KB"
          mb: "MB"
          gb: "GB"
          tb: "TB"
          
  support:
    array:
      words_connector: ", "
      two_words_connector: "와(과) "
      last_word_connector: ", "
      
  errors:
    format: "%{attribute} %{message}"
    messages:
      required: "필수입니다"
      blank: "비어있을 수 없습니다"
      
  activerecord:
    errors:
      messages:
        record_invalid: "검증에 실패했습니다: %{errors}"
        restrict_dependent_destroy:
          has_one: "%{record}가 존재하므로 삭제할 수 없습니다"
          has_many: "%{record}가 존재하므로 삭제할 수 없습니다"